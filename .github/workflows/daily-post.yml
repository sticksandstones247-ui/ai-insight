name: Daily AI Post

on:
  # cronは初回のworkflow_dispatch動作確認が済んでから有効化する
  # schedule:
  #   - cron: '0 22 * * *'  # UTC 22:00 = JST 翌7:00
  workflow_dispatch: {}

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-daily-post.mjs

      - name: Commit and push
        run: |
          git config user.name "ai-daily-post[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add src/content/posts/
          if git diff --cached --quiet; then
            echo "変更なし（生成スキップ or 既存記事）"
          else
            git commit -m "🤖 自動投稿: $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
            git push
          fi
